name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # `--if-present` permet au pipeline de passer tant qu'aucun script de test
      # n'existe (voir #20). Les tests seront exécutés automatiquement une fois ajoutés.
      - name: Test
        run: npm test --if-present
